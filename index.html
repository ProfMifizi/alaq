<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ALAQ — Apprendre à lire avec le Qor'an</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Sans+Arabic:wght@400;500;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#252120; --panel:#322B28; --panel2:#3C342F; --line:#4A403A;
    --gold:#DC902E; --gold2:#E8A94F; --gold-d:#B5751F;
    --cream:#F2E9DA; --muted:#B9A99A;
    --green:#6FB08A; --green-d:#558B6E; --green-bg:#22332B;
    --coral:#E07A5F; --coral-d:#BC5B43; --coral-bg:#3A2723;
    --lock:#5A504A;
    --ui:'Nunito',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --ar:'Amiri',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--cream);font-family:var(--ui);line-height:1.4;overflow-x:hidden;
    background-image:radial-gradient(circle at 50% 0%, #3a302b 0, #2c2624 38%, var(--bg) 75%);
    background-attachment:fixed;}
  button{font-family:var(--ui);cursor:pointer;color:inherit}
  .gold{color:var(--gold);font-family:var(--ar)}

  /* ====== Barre du haut ====== */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:12px 16px;background:transparent;backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px)}
  .blogo{width:30px;height:30px;border-radius:8px;object-fit:cover;border:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:900;letter-spacing:.14em;color:var(--gold);font-size:18px}
  .brand .dot{width:26px;height:26px;border-radius:7px;background:var(--gold);display:grid;place-items:center;
    color:var(--bg);font-family:var(--ar);font-weight:700;font-size:18px}
  .stats{display:flex;gap:10px;font-weight:800;font-size:14px;align-items:center}
  .stat{display:flex;align-items:center;gap:5px}
  .sndtog{background:none;border:none;font-size:18px;line-height:1;padding:0 2px;cursor:pointer}
  .back-link{display:none;background:none;border:none;color:var(--muted);font-weight:800;font-size:14px;margin:0 0 10px;cursor:pointer}
  .narr-link{display:block;width:100%;background:none;border:none;color:var(--muted);
    font-weight:800;font-size:13px;padding:2px 0 12px;text-align:center;cursor:pointer;letter-spacing:.02em}
  .narr-link:active{color:var(--gold2)}

  /* ====== Parcours ====== */
  .wrap{max-width:520px;margin:0 auto;padding:64px 16px 120px}
  .hero{text-align:center;padding:26px 14px 8px}
  .hero img{width:120px;height:auto;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.45);border:1px solid var(--line)}
  .hero h1{font-size:15px;color:var(--muted);font-weight:700;margin-top:12px}
  .unit-head{display:flex;align-items:center;gap:12px;margin:26px 4px 6px;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .unit-head .u-no{font-family:var(--ar);font-size:26px;color:var(--gold);line-height:1}
  .unit-head h2{font-size:17px;font-weight:900}
  .unit-head p{font-size:13px;color:var(--muted);font-weight:600}
  .path{display:flex;flex-direction:column;align-items:center;gap:26px;margin-top:52px;position:relative}
  .node{position:relative;transition:transform .12s}
  .node:active{transform:translateY(2px)}
  .bwrap{position:relative;width:74px;height:74px;margin:0 auto}
  .bubble{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;border:none;font-weight:900}
  .bubble .bi{font-size:30px;line-height:1;font-family:var(--ar),'Nunito',sans-serif}
  .done .bubble{background:var(--gold);color:var(--bg);box-shadow:0 6px 0 var(--gold-d)}
  .current .bubble{background:var(--gold);color:var(--bg);box-shadow:0 6px 0 var(--gold-d),0 0 0 6px rgba(220,144,46,.22)}
  .locked .bubble{background:var(--panel2);color:var(--lock);box-shadow:0 6px 0 #2c2521;cursor:not-allowed}
  .node .ring{position:absolute;inset:-8px;border-radius:50%;border:3px dashed transparent;pointer-events:none}
  .current .ring{border-color:var(--gold2);animation:spin 9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .start-flag{position:absolute;top:-40px;left:50%;transform:translateX(-50%);background:#fff;color:#3b342f;
    font-weight:900;font-size:12px;padding:5px 11px;border-radius:10px;box-shadow:0 4px 0 #d8ccb8;
    white-space:nowrap;pointer-events:none;z-index:2}
  .start-flag::after{content:'';position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);
    border:6px solid transparent;border-top-color:#fff}
  .node .cap{margin-top:8px;text-align:center;font-size:12px;font-weight:800;color:var(--muted);max-width:130px}
  .done .cap{color:var(--gold2)}
  .check{position:absolute;right:-2px;bottom:-2px;background:#fff;color:var(--green-d);width:24px;height:24px;
    border-radius:50%;display:grid;place-items:center;font-size:14px;font-weight:900;box-shadow:0 2px 4px rgba(0,0,0,.3)}

  /* ====== Joueur ====== */
  .player{position:fixed;inset:0;z-index:50;background:var(--bg);
    background-image:radial-gradient(circle at 50% 0%, #3a302b 0, #2c2624 38%, var(--bg) 75%);
    display:none;flex-direction:column}
  .player.on{display:flex}
  .p-top{display:flex;align-items:center;gap:14px;padding:14px 16px}
  .p-close{background:none;border:none;color:var(--muted);font-size:26px;font-weight:700;line-height:1;padding:0 4px}
  .pbar{flex:1;height:16px;background:var(--panel2);border-radius:10px;overflow:hidden}
  .pbar i{display:block;height:100%;width:0;background:var(--gold);border-radius:10px;transition:width .35s}
  .hearts{display:flex;align-items:center;gap:4px;color:var(--coral);font-weight:900;font-size:18px}
  .p-body{flex:1;overflow-y:auto;padding:8px 22px 24px;max-width:560px;width:100%;margin:0 auto}
  .q-title{font-size:21px;font-weight:900;margin:14px 0 22px}
  .glyph-big{font-family:var(--ar);font-size:80px;text-align:center;color:var(--gold);
    margin:4px 0 24px;line-height:1;padding:44px 0 14px}
  .speak{display:block;margin:0 auto 22px;background:var(--panel);border:2px solid var(--line);
    color:var(--gold2);border-radius:14px;padding:12px 20px;font-weight:800;font-size:15px}
  .bigspeak{display:grid;place-items:center;margin:14px auto 20px;width:120px;height:120px;border-radius:28px;
    border:2px solid var(--line);border-bottom-width:5px;background:var(--panel);font-size:52px}
  .bigspeak:active{transform:translateY(2px);border-color:var(--gold)}
  .hint{color:var(--muted);font-size:13px;font-weight:700;margin-top:16px}

  .opts{display:grid;gap:12px}
  .opts.grid2{grid-template-columns:1fr 1fr}
  .opts.grid3{grid-template-columns:1fr 1fr 1fr}
  .opt{background:var(--panel);border:2px solid var(--line);border-bottom-width:4px;color:var(--cream);
    border-radius:14px;padding:16px 10px;font-size:17px;font-weight:800;text-align:center;transition:.08s;
    min-height:60px;display:grid;place-items:center}
  .opt .ar{font-family:var(--ar);font-size:42px;color:var(--gold);line-height:1.2}
  .opt.sel{border-color:var(--gold);background:#3a312b;box-shadow:inset 0 0 0 1px var(--gold)}
  .opt.ok{border-color:var(--green);background:var(--green-bg);color:var(--green)}
  .opt.ok .ar{color:var(--green)}
  .opt.bad{border-color:var(--coral);background:var(--coral-bg);color:var(--coral)}
  .opt.bad .ar{color:var(--coral)}
  .opt[disabled]{opacity:.55}
  .opt .sopt{font-size:34px;line-height:1.2}

  .learn{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px;text-align:center}
  .learn .nm{font-size:22px;font-weight:900;margin-top:8px}
  .learn .son{display:inline-block;margin-top:8px;background:#3a312b;color:var(--gold2);border-radius:20px;
    padding:5px 14px;font-weight:800;font-size:14px}
  .learn .mn{color:var(--muted);font-size:15px;margin-top:14px;font-weight:600}
  .learn .demo{font-family:var(--ar);font-size:54px;color:var(--gold);margin:14px 0 4px;line-height:1.3}
  .badge-new{display:inline-block;background:var(--gold);color:var(--bg);font-weight:900;font-size:11px;
    letter-spacing:.1em;padding:4px 10px;border-radius:8px;margin-bottom:16px}
  .ar-tap{background:none;border:none;display:block;margin:0 auto;color:var(--gold);font-family:var(--ar);
    font-size:90px;line-height:1;padding:6px 22px;border-radius:18px}
  .ar-tap:active{background:#3a312b}
  .pop{animation:pop .35s}
  @keyframes pop{40%{transform:scale(1.15)}}

  .explore{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .exp-card{background:var(--panel);border:2px solid var(--line);border-bottom-width:4px;border-radius:16px;
    padding:18px 6px;display:flex;flex-direction:column;align-items:center;gap:8px}
  .exp-card:active{background:#3a312b;border-color:var(--gold)}
  .exp-card .ar{font-family:var(--ar);font-size:50px;color:var(--gold);line-height:1.2}
  .exp-card .enm{font-size:13px;font-weight:800;color:var(--muted)}
  .exp-card .dots{font-size:12px;color:var(--gold2);letter-spacing:2px;font-weight:900}

  .agrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;direction:rtl}
  .ag{background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:10px 2px;
    font-family:var(--ar);font-size:30px;color:var(--gold);line-height:1.2}
  .ag.seen{border-color:var(--gold);color:var(--gold2)}
  .ag:active{background:#3a312b}

  .verse{direction:rtl;font-family:var(--ar);font-size:36px;line-height:2.1;text-align:center;
    background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px 12px;margin-bottom:6px}
  .vl{border-radius:6px;padding:0}
  .vl.hit{color:var(--gold);text-shadow:0 0 14px rgba(220,144,46,.45)}
  .vl.miss{color:var(--coral)}
  .vw{display:inline-block;margin:0 10px}
  .zoom-btn{display:block;margin:0 auto 12px;background:var(--panel);border:1px solid var(--line);
    color:var(--gold2);font-weight:800;font-size:14px;border-radius:12px;padding:8px 16px}
  .verse.zoomed{font-size:60px;line-height:2.4}

  .frow{display:flex;gap:10px;direction:rtl;justify-content:center;margin:10px 0 6px}
  .fcell{flex:1;max-width:86px;background:var(--panel);border:2px solid var(--line);border-radius:14px;
    padding:20px 4px 16px;min-height:108px;text-align:center}
  .fcell:active{border-color:var(--gold)}
  .fcell.done{border-color:var(--gold);background:#3a312b}
  .fcell.done .fl{color:var(--gold2)}
  .fcell .ar{font-family:var(--ar);font-size:40px;color:var(--gold);line-height:1.2;display:block;margin-bottom:16px}
  .fcell .fl{font-size:10px;font-weight:900;color:var(--muted);letter-spacing:.04em}

  .wordcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px;text-align:center}
  .wordcard .emo{font-size:56px}
  .wordcard .fr{color:var(--muted);font-weight:800;margin-top:8px}
  /* écriture "en ligne" : on désactive les ligatures verticales coraniques */
  .linear-ar{font-family:'Noto Sans Arabic',sans-serif;font-feature-settings:"calt" 0,"liga" 0,"dlig" 0,"rlig" 0;
    font-variant-ligatures:none;letter-spacing:0}
  .mic-btn{display:block;margin:6px auto 0;background:var(--gold);color:var(--bg);font-weight:900;
    border:none;border-radius:14px;padding:14px 26px;font-size:17px;box-shadow:0 4px 0 var(--gold-d)}
  .mic-btn.listening{background:var(--coral);box-shadow:0 4px 0 #b85c43;animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  .reco-fb{margin-top:12px;min-height:20px}
  .reco-ok{color:var(--green);font-weight:900;font-size:17px}
  .reco-retry{color:var(--gold2);font-weight:800}
  .reco-warn{color:var(--muted);font-weight:700;font-size:14px;line-height:1.4}
  .slots{direction:rtl;font-family:var(--ar);font-size:64px;color:var(--cream);text-align:center;min-height:120px;
    background:var(--panel);border:2px dashed var(--line);border-radius:18px;padding:34px 12px 18px;margin-bottom:14px;line-height:1.5}
  .slots .ph{color:var(--lock)}
  .tiles{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;direction:rtl}
  .tile{background:var(--panel);border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;
    width:64px;height:64px;font-family:var(--ar);font-size:36px;color:var(--gold);display:grid;place-items:center}
  .tile[disabled]{opacity:.25}
  .tile.htile{font-family:'Noto Sans Arabic',sans-serif;font-size:24px}
  .tile.htile .dc{font-size:30px;opacity:.55}
  .undo{display:block;margin:14px auto 0;background:none;border:none;color:var(--muted);font-weight:800;font-size:14px}

  .trow{display:flex;gap:10px;justify-content:center;margin-top:14px}
  .trow .speak{margin:0}
  .trace{display:block;margin:0 auto;width:min(300px,82vw);height:min(300px,82vw);background:var(--panel);
    border:2px solid var(--line);border-radius:18px;touch-action:none}

  .p-foot{border-top:1px solid var(--line);padding:16px 22px;max-width:560px;width:100%;margin:0 auto;transition:background .15s}
  .p-foot.ok{background:var(--green-bg);border-top-color:var(--green-d)}
  .p-foot.bad{background:var(--coral-bg);border-top-color:var(--coral-d)}
  .fb{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-weight:900;font-size:16px}
  .fb.ok{color:var(--green)} .fb.bad{color:var(--coral)}
  .fb .ar{font-family:var(--ar)}
  .cta{width:100%;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:900;letter-spacing:.04em;
    color:var(--bg);background:var(--gold);box-shadow:0 5px 0 var(--gold-d)}
  .cta:active{transform:translateY(3px);box-shadow:0 2px 0 var(--gold-d)}
  .cta[disabled]{background:var(--panel2);color:var(--muted);box-shadow:0 5px 0 #2c2521}
  .cta.ok{background:var(--green);box-shadow:0 5px 0 var(--green-d)}
  .cta.bad{background:var(--coral);box-shadow:0 5px 0 var(--coral-d)}

  .finish{position:fixed;inset:0;z-index:60;background:var(--bg);
    background-image:radial-gradient(circle at 50% 0%, #3a302b 0, #2c2624 38%, var(--bg) 75%);
    display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px}
  .finish.on{display:flex}
  .finish .big{font-family:var(--ar);font-size:80px;color:var(--gold)}
  .finish h2{font-size:26px;font-weight:900;margin:10px 0 26px}
  .rewards{display:flex;gap:14px;margin-bottom:30px}
  .reward{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:14px 22px;min-width:120px}
  .reward .lab{font-size:12px;font-weight:900;letter-spacing:.1em;color:var(--gold2)}
  .reward .val{font-size:26px;font-weight:900;margin-top:4px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);background:var(--panel);
    border:1px solid var(--line);color:var(--cream);padding:12px 18px;border-radius:12px;font-weight:800;
    font-size:14px;z-index:80;transition:.3s;opacity:0;pointer-events:none}
  .toast.on{transform:translateX(-50%) translateY(0);opacity:1}

  /* ---- visite guidée disque 1 ---- */
  .vw-fr{color:var(--gold2);font-weight:900;letter-spacing:.12em}
  .demo .formrow,.formrow{display:flex;gap:22px;justify-content:center;margin:14px 0}
  .combine{display:flex;align-items:center;justify-content:center;gap:12px;margin:10px 0 26px;flex-wrap:wrap}
  .cmb{font-size:56px;font-weight:900;color:var(--cream);transition:.3s}
  .cmb.merge{transform:translateX(0);color:var(--gold)}
  #cmbA.merge{transform:translateX(18px)} #cmbB.merge{transform:translateX(-18px)}
  .cmb-plus,.cmb-eq{font-size:32px;color:var(--muted);font-weight:800}
  .cmb-res{color:var(--gold);min-width:60px}
  .hk3{display:flex;gap:10px;justify-content:center;margin-top:8px;flex-wrap:wrap}
  .hkcirc{position:relative;background:none;border:none;width:108px;height:150px;
    display:flex;flex-direction:column;align-items:center;justify-content:center}
  .hkcirc .circ{position:absolute;top:32px;left:50%;transform:translateX(-50%);
    width:86px;height:86px;border-radius:50%;border:3px dotted var(--gold-d)}
  .hkcirc .ctr{position:absolute;top:32px;left:50%;transform:translateX(-50%);
    width:86px;height:86px;display:grid;place-items:center;font-size:13px;font-weight:800;color:var(--muted)}
  .hkcirc .sign{position:absolute;left:50%;transform:translateX(-50%);
    font-family:var(--ar);font-size:40px;color:var(--gold);line-height:1;z-index:2}
  .hkcirc .sign.top{top:6px}
  .hkcirc .sign.bot{top:120px}
  .hkcirc .hl{position:absolute;bottom:0;font-size:11px;font-weight:900;color:var(--muted);white-space:nowrap}
  .hkcirc.lit .circ{border-color:var(--gold);border-style:solid}
  .hkcirc.lit .sign{color:var(--gold2)}
  .assoc-l{font-family:var(--ar);font-size:80px;text-align:center;line-height:1.4}
  .assoc-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .assoc-c{background:var(--panel);border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;
    padding:14px 4px;display:flex;flex-direction:column;align-items:center;gap:6px}
  .assoc-c.lit{border-color:var(--gold);background:#3a312b}
  .assoc-c .sm{font-family:var(--ar);font-size:34px;color:var(--muted)}
  .assoc-c .res{font-family:var(--ar);font-size:40px;color:var(--gold);line-height:1.3}
  .tapset{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .tapset.c3{grid-template-columns:1fr 1fr 1fr}
  .ts-card{background:var(--panel);border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;
    padding:14px 4px;display:flex;flex-direction:column;align-items:center;gap:4px}
  .ts-card.seen{border-color:var(--gold)}
  .ts-card .ar{font-family:var(--ar);font-size:40px;color:var(--gold);line-height:1.3}
  .ts-card .enm{font-size:11px;font-weight:800;color:var(--muted)}
  .cmp-row{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--panel);
    border:2px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;font-family:var(--ar);font-size:38px}
  .cmp-row.lit{border-color:var(--gold)}
  .cmp-vs{color:var(--muted);font-size:20px}
  .cmp-l{font-family:var(--ui);font-size:13px;font-weight:800;color:var(--muted);margin-inline-start:auto}
  .readbox{display:flex;justify-content:center;gap:0;font-size:54px;background:var(--panel);
    border:2px solid var(--line);border-radius:18px;padding:22px 14px;touch-action:none;user-select:none}
  .readbox.ar{font-family:var(--ar);font-size:62px}
  .rc{color:var(--cream);transition:color .12s}
  .rc.on{color:var(--gold);text-shadow:0 0 12px rgba(220,144,46,.55)}
  .readarrow{text-align:center;font-size:30px;color:var(--gold2);margin-top:14px;height:36px}
  .readarrow span{display:inline-block;animation:slidearrow 1.1s ease-in-out infinite}
  .readarrow.rtl span{transform:scaleX(-1)}
  @keyframes slidearrow{0%,100%{transform:translateX(-8px)}50%{transform:translateX(8px)}}
  .readarrow.rtl span{animation:slidearrowR 1.1s ease-in-out infinite}
  @keyframes slidearrowR{0%,100%{transform:scaleX(-1) translateX(-8px)}50%{transform:scaleX(-1) translateX(8px)}}
  .tapset.c4{grid-template-columns:repeat(4,1fr);gap:8px}
  .tapset.c4 .ts-card{padding:12px 2px}
  .tapset.c4 .ts-card .ar{font-size:32px}
  .ag.hl{background:#4a3a22;border-color:var(--gold-d)}
  .ag.hl.hit{background:var(--gold);color:var(--bg)}
  .source{text-align:center;margin-bottom:18px}
  .srcL{background:var(--panel);border:2px solid var(--gold);border-radius:18px;width:90px;height:90px;
    font-family:var(--ar);font-size:54px;color:var(--gold);line-height:90px;text-align:center;margin:0 auto;
    touch-action:none;user-select:none;-webkit-user-select:none}
  .srcL:active{background:#3a312b}
  .drag-ghost{position:fixed;transform:translate(-50%,-50%);z-index:200;pointer-events:none;

const ZWJ='\u200D';
const TAT='\u0640'; // tatweel : trait de liaison visible et fiable (iOS)
const NONJOIN='اأإآدذرزوةىءٱ';            // ne s'attachent pas à gauche
const DIA=/[\u064B-\u0652\u0670]/g;        // harakats, sukun, chedda, alif suscrit
const strip=s=>s.replace(DIA,'');
const joinsL=ch=>!NONJOIN.includes(ch);
function formGlyph(L,pos){ // 0 isolée 1 début 2 milieu 3 fin
  const jl=joinsL(L);                   // se lie à la lettre suivante (à gauche) ?
  if(pos===1)return jl?L+TAT:L;         // début  : liaison à gauche (sinon = isolée)
  if(pos===2)return jl?TAT+L+TAT:TAT+L; // milieu : liaison des 2 côtés (sinon = fin)
  if(pos===3)return TAT+L;              // fin    : liaison à droite
  return L;                             // isolée
}

const ALIF_FAM='اأإآٱ';
function letterKey(ch){ return ALIF_FAM.includes(ch)?'ا':ch; }
function sameLetter(a,b){ return letterKey(a)===letterKey(b); }

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rnd(a){return a[Math.floor(Math.random()*a.length)];}

function mcq(o){o.type='mcq';return o;}

// Place la bonne réponse à une position tournante (0,1,2,0,1,2…) pour éviter
// qu'elle tombe trop souvent au même endroit. opts = tableau d'options, ans = clé correcte.
let _lastPos=-1;
function balancePos(opts,ansKey){
  const n=opts.length;
  const ai=opts.findIndex(o=>o.key===ansKey);
  if(ai<0)return opts;
  let target=Math.floor(Math.random()*n);
  if(n>1&&target===_lastPos)target=(target+1+Math.floor(Math.random()*(n-1)))%n;
  _lastPos=target;
  const arr=opts.slice();
  const[a]=arr.splice(ai,1);
  arr.splice(target,0,a);
  return arr;
}

// Pour « touche le bon son », les 3 options doivent sonner DIFFÉREMMENT.
// La voix de synthèse ne rend ni la chedda ni les nuances de longueur, donc on
// n'utilise pas les quasi-homographes (confus) : on prend d'autres mots de l'unité,
// en garantissant des sons mutuellement distincts (clés audio différentes).
function audioKey(s){ return (s||'').normalize('NFC').replace(/\u0651/g,''); }
function wordSoundOptions(U,w){
  const used=new Set([audioKey(w.w)]);
  const others=[];
  for(const x of shuffle(U.words||[])){
    const xk=audioKey(x.w);
    if(x.w===w.w||used.has(xk))continue;
    used.add(xk); others.push(x.w);
    if(others.length>=2)break;
  }
  return balancePos(shuffle([{snd:w.w,key:w.w},...others.map(p=>({snd:p,key:p}))]),w.w);
}

function buildMemo(U){
  const q=[];
  U.letters.forEach(L=>q.push({type:'learn',L}));
  q.push({type:'explore',items:U.letters.map(L=>({ar:L,lab:U.alpha[L].n,say:L})),min:3,
    title:'Mémorise les trois lettres 🎵'});
  for(let r=0;r<3;r++)shuffle(U.letters).forEach(L=>q.push(mcq({
    prompt:'Écoute… puis touche la bonne lettre',audio:L,graded:true,grid:'grid3',answer:L,
    options:balancePos(shuffle(U.letters).map(x=>({ar:x,key:x})),L)})));
  for(let r=0;r<3;r++)shuffle(U.letters).forEach(L=>q.push(mcq({
    prompt:'Quel son fait cette lettre ?',glyph:L,graded:true,grid:'grid3',answer:L,
    options:balancePos(shuffle(U.letters).map(x=>({snd:x,key:x})),L)})));
  U.letters.forEach(L=>q.push({type:'trace',L}));
  return q;
}

function buildSpot(U){
  const q=[];
  FATIHA.forEach((v,vi)=>{
    U.letters.forEach(L=>{ if([...strip(v)].some(ch=>sameLetter(ch,L))) q.push({type:'spot',vi,L}); });
  });
  return q;
}

function buildForms(U){
  const q=[];
  U.letters.forEach(L=>q.push({type:'formsintro',L}));
  // début(1)/milieu(2)/fin(3) uniquement — jamais isolée ; on garantit que les 3 apparaissent
  let pc=Math.floor(Math.random()*3); const nextPos=()=>1+(pc++%3);
  // Mode A : un son → 3 lettres, chacune sous une position DIFFÉRENTE (début, milieu, fin)
  for(let r=0;r<3;r++)shuffle(U.letters).forEach(L=>{
    const ps=shuffle([1,2,3]);
    q.push(mcq({
      prompt:'Écoute… puis touche la bonne lettre 🎭',
      audio:L,graded:true,grid:'grid3',answer:L,
      options:balancePos(shuffle(U.letters).map((x,k)=>({ar:formGlyph(x,ps[k%3]),key:x})),L)}));
  });
  // Mode B : une lettre déguisée → 3 sons (on cycle début → milieu → fin)
  for(let r=0;r<3;r++)shuffle(U.letters).forEach(L=>q.push(mcq({
    prompt:'Quel son fait cette lettre déguisée ? 🎭',
    glyph:formGlyph(L,nextPos()),graded:true,grid:'grid3',answer:L,
    options:balancePos(shuffle(U.letters).map(x=>({snd:x,key:x})),L)})));
  return q;
}

function sylHK(L,h){return L+h;}
function buildHarakat(U){
  const q=[];
  U.letters.forEach(L=>{
    const syls=HK.map(h=>L+h[0]);
    q.push({type:'explore',items:HK.map(h=>({ar:L+h[0],lab:U.lat[L]+h[1],say:L+h[0]})),min:3,
      title:'Écoute et mémorise : '+U.alpha[L].n+' habillée 🎵'});
    // 3 tours : écoute → bonne syllabe
    for(let r=0;r<3;r++){
      const a1=syls[r%syls.length];
      q.push(mcq({prompt:'Écoute… puis touche la bonne syllabe',audio:a1,graded:true,grid:'grid3',answer:a1,
        options:balancePos(shuffle(syls).map(s=>({ar:s,key:s})),a1)}));
    }
    // 3 tours : lis la syllabe → bon son
    for(let r=0;r<3;r++){
      const a2=syls[r%syls.length];
      q.push(mcq({prompt:'Comment se lit cette syllabe ?',glyph:a2,graded:true,grid:'grid3',answer:a2,
        options:balancePos(shuffle(syls).map(s=>({snd:s,key:s})),a2)}));
    }
  });
  // Entraînement final : TOUTES les lettres × TOUTES les harakats, mélangées
  const ALL=[];U.letters.forEach(L=>HK.forEach(h=>ALL.push(L+h[0])));
  for(let i=0;i<8;i++){
    const a=ALL[i%ALL.length];
    q.push(mcq({prompt:'Quiz mélangé : écoute… puis touche',audio:a,graded:true,grid:'grid3',answer:a,
      options:balancePos(shuffle([a, ...shuffle(ALL.filter(x=>x!==a)).slice(0,2)]).map(s=>({ar:s,key:s})),a)}));
  }
  for(let i=0;i<4;i++){
    const a=ALL[(i*2)%ALL.length];
    q.push(mcq({prompt:'Comment se lit cette syllabe ?',glyph:a,graded:true,grid:'grid3',answer:a,
      options:balancePos(shuffle([a, ...shuffle(ALL.filter(x=>x!==a)).slice(0,2)]).map(s=>({snd:s,key:s})),a)}));
  }
  return q;
}

    options:shuffle(U.letters).map(x=>({snd:x,key:x}))})));
  shuffle(U.letters).slice(0,2).forEach(L=>q.push(mcq({

      options:shuffle([a,...shuffle(HALL.filter(x=>x!==a)).slice(0,2)]).map(s=>({ar:s,key:s}))}));}

// Révision cumulative : remplace le tour d'alphabet à partir de l'unité 2.
// Révise les lettres des unités PRÉCÉDENTES (reconnaissance début/milieu/fin,
// + avec un tachkīl) et fait réécrire des mots déjà vus.
function buildReview(U){
  const ui=UNITS.indexOf(U);
  const letters=[],words=[];
  for(let k=0;k<ui;k++){
    const P=UNITS[k];
    if(P.alpha)(P.letters||[]).forEach(L=>{ if(P.alpha[L])letters.push(L); });
    if(P.words)words.push(...P.words);
  }
  const q=[{type:'info',title:'Révision',html:
    '<p>Avant d\u2019apprendre de nouvelles lettres, on révise ce que tu connais déjà. C\u2019est parti !</p>'}];
  const pick3=(pool,L,glyph)=>{
    const others=shuffle(pool.filter(x=>x!==L)).slice(0,2);
    return balancePos(shuffle([L,...others]).map(x=>({ar:glyph(x),key:x})),L);
  };
  // A — reconnaissance par position : début (1), milieu (2), fin (3)
  if(letters.length)[1,2,3].forEach(p=>shuffle(letters).forEach(L=>q.push(mcq({
    prompt:'Touche la bonne lettre, même déguisée 🎭',audio:L,graded:true,grid:'grid3',answer:L,
    options:pick3(letters,L,x=>formGlyph(x,p))}))));
  // B — reconnaissance avec un tachkīl (lettre + harakat) par le son
  const SYL=[];letters.forEach(L=>HK.forEach(h=>SYL.push(L+h[0])));
  for(let r=0;r<3&&SYL.length;r++){const a=rnd(SYL);
    q.push(mcq({prompt:'Écoute… puis touche la bonne syllabe',audio:a,graded:true,grid:'grid3',answer:a,
      options:shuffle([a,...shuffle(SYL.filter(x=>x!==a)).slice(0,2)]).map(s=>({ar:s,key:s}))}));}
  // C — réécrire des mots déjà vus
  shuffle(words).slice(0,Math.min(5,words.length)).forEach(w=>q.push({type:'assemble',w,graded:true}));
  return q;
}

function readInstr(t){ // narration de l'instruction — coupée par NARR uniquement
  if(!NARR||!t)return;
  const plain=_normInstr(t);
  if(!plain)return;
  const url=INSTR_AUDIO[plain];
  if(!url){ speakFr(plain,true); return; }       // pas d'enregistrement -> voix de synthèse
  try{
    const a=new Audio(url); let settled=false;
    const toTTS=()=>{ if(settled)return; settled=true; try{a.pause();}catch(_){ } speakFr(plain,true); };
    a.addEventListener('playing',()=>{ settled=true; },{once:true});
    a.addEventListener('error',toTTS,{once:true});
    a.addEventListener('stalled',toTTS,{once:true});
    a.addEventListener('abort',toTTS,{once:true});
    const p=a.play(); if(p&&p.catch)p.catch(toTTS);
    setTimeout(()=>{ if(!settled&&a.paused)toTTS(); },1100);
  }catch(e){ speakFr(plain,true); }
}
function spokenInstr(st){
  // On lit UNIQUEMENT l'instruction (la consigne du dessous), jamais le titre/la question.
  if(st.note)return st.note;
  switch(st.type){
    case 'slide': return st.html;
    case 'info': return st.html;
    case 'learn': return 'Touche la lettre et écoute son nom au moins une fois';
    case 'formsintro': return 'Touche les quatre costumes de la lettre';
    case 'spot': return 'Touche toutes les lettres demandées dans le verset';
    case 'wordcard': return 'Touche le mot et écoute-le au moins une fois';
    case 'assemble': return st.fromFr?'Écris ce mot en arabe avec les lettres':'Écoute, puis écris le mot avec les lettres';
    case 'match': return 'Associe chaque mot arabe à sa traduction';
    case 'trace': return 'Repasse sur le modèle avec ton doigt';
    case 'mcq':
      if(st.audio)return 'Écoute, puis touche la bonne réponse';
      if(st.options&&st.options.some&&st.options.some(o=>o.snd))return 'Touche les haut-parleurs, écoute, puis choisis';
      return 'Choisis la bonne réponse';
    case 'explore': return 'Touche chaque case au moins 3 fois — et continue autant que tu veux.';
    default: return ''; // jamais de titre
  }
}

function toAr(n){return ['','١','٢','٣','٤','٥','٦','٧'][n]||n;}
function dkey(u,i){return 'U'+UNITS[u].no+'-D'+i;}
function discLabel(d,U){return d.label.indexOf('{L}')>=0?d.label.replace('{L}',U.letters.join(' ')):d.label;}
const BUILD='maj 28/06j · sons des unités 1 et 2 complétés dans la table audio';
function renderHome(){
  const h=document.getElementById('home');
  h.innerHTML='<div class="hero"><img src="'+LOGO+'" alt="Alaq">'+
   '<h1>Apprendre \u00e0 lire avec le Qor\u2019an</h1>'+
   '<div style="font-size:11px;color:var(--muted);opacity:.5;margin-top:4px">'+BUILD+'</div></div>';
  UNITS.forEach((U,u)=>{
    // VALIDATION d'une unité = terminer son DERNIER disque, le « Bilan ».
    // L'unité suivante se débloque dès que le « Bilan » de la précédente est terminé.
    // « Avancer ici » (à la fin de CHAQUE unité) = RACCOURCI test-out : réussir ce test (≤ 2 erreurs) valide tout jusqu'à cette unité INCLUSE.
    const prevValidated = U.no===1 || unitValidated(u-1);
    const playable = !!U.ready && prevValidated;
    const nDisc = discsFor(u).length;
    let sub;
    if(!U.ready)           sub = 'Les '+nDisc+' disques \u00b7 bient\u00f4t disponible';
    else if(prevValidated) sub = U.sub || ('Les '+nDisc+' disques');
    else                   sub = (U.sub || ('Les '+nDisc+' disques'))+' \u00b7 \uD83D\uDD12 r\u00e9ussis le test de l\u2019unit\u00e9 '+toAr(U.no-1)+' pour d\u00e9bloquer';
    h.insertAdjacentHTML('beforeend',
      '<div class="unit-head"><div class="u-no">'+toAr(U.no)+'</div><div>'+
      '<h2>Unit\u00e9 '+U.letters.join(' ')+'</h2>'+
      '<p>'+sub+'</p></div></div>');
    const path=document.createElement('div');path.className='path';
    if(u>0)path.style.marginTop='24px';
    discsFor(u).forEach((d,i)=>{
      const node=document.createElement('div');
      node.style.transform='translateX('+OFFS[i%OFFS.length]+'px)';
      if(playable){
        const done=!!S.done[dkey(u,i)];
        const unlocked=i===0||!!S.done[dkey(u,i-1)];
        const current=unlocked&&!done;
        node.className='node '+(done?'done':current?'current':'locked');
        node.innerHTML='<div class="bwrap"><div class="ring"></div>'+
          ''+
          '<button class="bubble" '+(unlocked?'':'disabled')+'>'+
            '<span class="bi">'+(unlocked?d.icon:'🔒')+'</span>'+
            (done?'<span class="check">\u2713</span>':'')+
          '</button></div>'+
          '<div class="cap">'+discLabel(d,U)+'</div>';
        if(unlocked)node.querySelector('.bubble').onclick=()=>startDisque(u,i);
      } else {
        node.className='node locked';
        node.innerHTML='<div class="bwrap"><button class="bubble" disabled>'+
          '<span class="bi" style="opacity:.45">'+d.icon+'</span></button></div>'+
          '<div class="cap">'+discLabel(d,U)+'</div>';
      }
      path.appendChild(node);
    });
    h.appendChild(path);
    // « Avancer ici » est proposé en fin de CHAQUE unité prête (toujours visible).
    // Le réussir (≤ 2 erreurs) valide tout JUSQU'À cette unité incluse → on passe à la suite. (Le « Bilan » reste la validation normale.)
    if(U.ready){
      h.insertAdjacentHTML('beforeend',
        '<div style="text-align:center;margin:14px 0 2px">'+
        '<button onclick="startExam('+u+')" style="background:transparent;color:var(--gold);border:1.5px solid var(--gold);'+
        'padding:9px 18px;border-radius:14px;font-weight:800;font-size:14px;cursor:pointer">\u26a1 Avancer ici\u00a0?</button>'+
        '<div style="color:var(--muted);font-size:12px;margin-top:6px;font-family:var(--ui)">D\u00e9j\u00e0 ce niveau\u00a0? R\u00e9ussis ce test (2 fautes max) pour tout valider jusqu\u2019ici.</div></div>');
    }
  });
}

  document.getElementById('finish').classList.remove('on');

  document.getElementById('st-hearts').textContent=S.hearts;

}

      '<button class="speak" onclick="window._traceClear&&window._traceClear()">🧽 Effacer</button></div>';
    setTimeout(()=>setupTrace(st.L),50);
    return;
  }

  if(st.type==='dragassoc'){
    const tilesArr=shuffle(st.cells.map(c=>c.madd));
    const tops=st.cells.map(c=>'<div class="da-cell" data-madd="'+c.madd+'" data-long="'+c.long+'" data-say="'+c.say+'">'+c.short+'</div>').join('');
    const tiles=tilesArr.map(ch=>'<div class="da-tile" data-ch="'+ch+'">'+ch+'</div>').join('');
    body.innerHTML='<div class="q-title">Forme la prolongation</div>'+
      '<div class="hint" style="margin:-8px 0 14px">Glisse chaque lettre de prolongation (en bas) sur la lettre du haut qui lui correspond. La voyelle s\u2019allonge !</div>'+
      '<div class="da-wrap" id="da-wrap">'+
        '<div class="da-tops">'+tops+'</div>'+
        '<div class="da-arrowrow">↑ dépose la prolongation sur sa lettre ↑</div>'+
        '<div class="da-bottoms">'+tiles+'</div>'+
        '<div class="dm-fb" id="da-fb"></div>'+
      '</div>';
    setTimeout(()=>setupDragAssoc(st),50);
    return;
  }

  if(st.type==='dragmad'){
    const tiles=shuffle(['ا','و','ي']).map(ch=>'<div class="dm-tile" data-ch="'+ch+'">'+ch+'</div>').join('');
    body.innerHTML='<div class="q-title">Fais glisser la bonne prolongation</div>'+
      '<div class="hint" style="margin:-8px 0 16px">La voyelle est déjà sur la lettre. Glisse dessus la lettre de prolongation qui l\u2019allonge.</div>'+
      '<div class="dm-wrap" id="dm-wrap">'+
        '<div class="dm-target" id="dm-target">'+st.base+st.hk+'</div>'+
        '<div class="dm-hint">↑ glisse la prolongation ici</div>'+
        '<div class="dm-tray">'+tiles+'</div>'+
        '<div class="dm-fb" id="dm-fb"></div>'+
      '</div>';
    setTimeout(()=>setupDragMad(st),50);
    return;
  }

  /* mcq */
  cta.textContent='VÉRIFIER';cta.onclick=ctaClick;
  let html='<div class="q-title">'+st.prompt+'</div>';
  if(st.audio)html+='<button class="bigspeak" onclick="speak(\''+st.audio+'\')">🔊</button>'+
    '<div class="hint" style="text-align:center;margin:-10px 0 18px">Touche le haut-parleur pour réécouter</div>';
  if(st.glyph){html+='<div class="glyph-big'+(st.glyphLinear?' linear-ar':'')+'">'+st.glyph+'</div>';}
  if(st.emo)html+='<div style="text-align:center;font-size:40px;margin:-6px 0 0">'+st.emo+'</div>';
  if(st.fr)html+='<div class="fr" style="text-align:center;margin:2px 0 10px">'+st.fr+'</div>';
  if(st.options.some(o=>o.snd))html+='<div class="hint" style="text-align:center;margin:-6px 0 16px">👇 Touche les haut-parleurs pour écouter les sons, choisis, puis valide</div>';
  html+='<div class="opts'+(st.grid?' '+st.grid:'')+'" id="opts"></div>';
  st.options=balancePos(st.options,st.answer);
  body.innerHTML=html;
  const box=document.getElementById('opts');
  st.options.forEach((o,k)=>{
    const b=document.createElement('button');b.className='opt';
    b.innerHTML=o.snd!==undefined?'<span class="sopt">🔊</span>':
      o.ar!==undefined?'<span class="ar">'+o.ar+'</span>':o.txt;
    b.onclick=()=>{if(o.snd)speak(o.snd);selOpt(k,b);};
    box.appendChild(b);
  });
}

function selOpt(k,el){
  if(answered)return;
  [...document.querySelectorAll('.opt')].forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');picked=k;
  document.getElementById('cta').disabled=false;
}

function ctaClick(){
  const st=QUEUE[qi];
  if(answered)return;
  const foot=document.getElementById('p-foot');
  const fb=document.getElementById('fb');
  const cta=document.getElementById('cta');
  let ok;
  if(st.type==='assemble'){
    if(window._asm.ch.length!==window._asm.t.length)return;
    ok=window._asm.ch.join('').normalize('NFC')===window._asm.t.join('').normalize('NFC');
    answered=true;
    if(ok){fb.className='fb ok';fb.innerHTML='<span>✓</span> Excellent ! ماشاء الله — <span class="ar" style="font-size:24px">'+st.w.w+'</span>';}
    else{
      const mine=window._asm.ch.join('');
      fb.className='fb bad';
      fb.innerHTML='<span>✕</span> Le mot était : <span class="ar" style="font-size:26px">'+st.w.w+'</span>'+
        '<div style="opacity:.85;font-size:14px;margin-top:6px">Toi : <span class="ar" style="font-size:24px">'+mine+'</span></div>';
    }
  } else {
    if(picked===null)return;
    answered=true;
    ok=st.options[picked].key===st.answer;
    const opts=[...document.querySelectorAll('.opt')];
    opts.forEach((o,k)=>{o.disabled=true;
      if(st.options[k].key===st.answer)o.classList.add('ok');
      else if(k===picked)o.classList.add('bad');});
    if(ok){fb.className='fb ok';fb.innerHTML='<span>✓</span> Excellent ! ماشاء الله';}
    else{
      const good=st.options.find(o=>o.key===st.answer);
      fb.className='fb bad';
      const show=good.ar!==undefined?good.ar:(good.snd!==undefined?st.answer:null);
      fb.innerHTML='<span>✕</span> Réponse : '+(show!==null?'<span class="ar" style="font-size:26px">'+show+'</span>':good.txt);
      if(SND&&good.snd!==undefined)speak(st.answer);
    }
    // Reconnaissance visuelle (forme déguisée, lecture de mot) : on rejoue le son de la lettre/mot À LA RÉVÉLATION,
    // jamais avant — sinon la réponse serait donnée. Renforce l’association forme ↔ son après coup.
    if(SND&&st.glyph!==undefined)speak(st.answer);
  }
  if(ok){
    foot.classList.add('ok');cta.className='cta ok';
    // si on est en mode rattrapage et qu'on réussit, on retire la question de la liste
    if(inRetry){const k=MISSED.indexOf(st);if(k>=0)MISSED.splice(k,1);}
  }
  else{
    foot.classList.add('bad');cta.className='cta bad';
    if(st.graded){
      wrongCount++;
      // on mémorise la question ratée pour la rejouer en fin de leçon
      if(MISSED.indexOf(st)<0)MISSED.push(st);
      S.hearts=Math.max(0,S.hearts-1);save();
      document.getElementById('p-hearts').textContent=S.hearts;
      document.getElementById('st-hearts').textContent=S.hearts;
    }
  }
  cta.textContent='CONTINUER';cta.onclick=advance;cta.disabled=false;
}

function finishDisque(){
  if(EXAM)return finishExam();
  // S'il reste des questions ratées, on les rejoue (modèle Duolingo) avant de terminer
  if(MISSED.length){
    inRetry=true;
    QUEUE=shuffle(MISSED.slice()); // rejoue les ratées, mélangées
    qi=0;
    // petit écran de transition
    const body=document.getElementById('p-body');
    const foot=document.getElementById('p-foot');
    foot.className='p-foot';document.getElementById('fb').innerHTML='';
    {const bl=document.getElementById('backLink');if(bl)bl.style.display='none';}
    body.innerHTML='<div class="learn" style="margin-top:24px">'+
      '<div style="font-size:60px">🔁</div>'+
      '<div class="nm" style="margin-top:10px">On corrige tes erreurs</div>'+
      '<div class="mn" style="font-size:16px;margin-top:10px">Reprenons les '+MISSED.length+
      ' question'+(MISSED.length>1?'s':'')+' à revoir, jusqu\u2019à ce que tu les réussisses. ماشاء الله, tu y es presque !</div></div>';
    const cta=document.getElementById('cta');
    cta.className='cta';cta.disabled=false;cta.textContent='CORRIGER MES ERREURS';
    cta.onclick=()=>renderStep();
    document.getElementById('pbar-i').style.width='100%';
    return;
  }
  if(REVIEW)return finishReview();   // révision globale : aucun disque à marquer
  const id=dkey(curU,curD);
  const wasDone=!!S.done[id];
  S.done[id]=true;
  const gain=(curD===discsFor(curU).length-1?20:10)*(wasDone?0.5:1);
  S.xp+=gain;
  const t=today();
  if(S.lastDay!==t){
    const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    S.streak=(S.lastDay===y)?S.streak+1:1;S.lastDay=t;
  }
  save();
  document.getElementById('player').classList.remove('on');
  const acc=total?Math.round((total-Math.min(total,wrongCount))/total*100):100;
  const isBilan=(curD===discsFor(curU).length-1);
  document.getElementById('fin-icon').textContent=isBilan?'🏆':'✓';
  document.getElementById('fin-extra').innerHTML='';
  document.getElementById('fin-title').textContent=isBilan?('Unité '+toAr(UNITS[curU].no)+' validée ! 🎉'):(discLabel(discsFor(curU)[curD],UNITS[curU])+' — terminé !');
  document.getElementById('fin-xp').textContent='+'+gain;
  document.getElementById('fin-acc').textContent=acc+'%';
  document.getElementById('finish').classList.add('on');
}
function closeFinish(){document.getElementById('finish').classList.remove('on');returnFromPlayer();}

/* ===== Test-out « Avancer ici ? » : 20 questions, 2 erreurs max ===== */
function buildExam(U){
  const W=U.words||[], L3=U.letters||[];
  // LECTURE — lire le mot, toucher le bon son (options audibles et distinctes)
  const reading=shuffle(W).map(w=>mcq({prompt:'Lis le mot, puis touche le bon son',
    glyph:w.w,glyphLinear:true,emo:w.e,fr:w.fr,graded:true,grid:'grid3',answer:w.w,options:wordSoundOptions(U,w)}));
  // ÉCRITURE — composer le mot avec les lettres
  const writing=shuffle(W).map(w=>({type:'assemble',w,graded:true}));
  // POSITIONS — forme déguisée (début/milieu/fin) → quelle lettre ? (visuel, jamais isolée)
  const pos=[];
  [1,2,3].forEach(p=>shuffle(L3).forEach(Lt=>pos.push(mcq({
    prompt:'Quelle lettre est-ce, même déguisée 🎭 ?',glyph:formGlyph(Lt,p),graded:true,grid:'grid3',answer:Lt,
    options:balancePos(shuffle(L3).map(x=>({ar:x,key:x})),Lt)}))));
  const take=(a,n)=>shuffle(a).slice(0,n);
  const q=shuffle([...take(reading,7),...take(writing,6),...take(pos,7)]).slice(0,20);
  return [{type:'slide',title:'Avancer ici ?',html:
    '<p>Un test de <b>'+q.length+' questions</b> \u2014 lecture, écriture et reconnaissance des lettres en position. '+
    'Avec <b>2 erreurs maximum</b>, tu valides toute l\u2019unité et tu passes à la suite. Prêt ?</p>'},...q];
}
function startExam(u){
  EXAM=true;curU=u;curD=-1;
  QUEUE=buildExam(UNITS[u]);qi=0;wrongCount=0;MISSED=[];inRetry=false;
  S.hearts=5;S.heartDay=today();save();
  document.getElementById('player').classList.add('on');
  document.getElementById('finish').classList.remove('on');
  document.getElementById('p-hearts').textContent=S.hearts;
  document.getElementById('st-hearts').textContent=S.hearts;
  total=QUEUE.filter(s=>s.graded).length;
  renderStep();
}
function finishExam(){
  EXAM=false;
  const u=curU, pass=wrongCount<=2;
  const acc=total?Math.round((total-Math.min(total,wrongCount))/total*100):100;
  if(pass){
    if(!S.tests)S.tests={};
    // « Avancer ici » = raccourci test-out : valide les unités JUSQU'À CELLE-CI INCLUSE (k <= u), en terminant leurs disques.
    // On peut ainsi sauter le parcours et passer à la suite. (Le « Bilan » reste la validation NORMALE d'une unité.)
    for(let k=0;k<=u;k++){
      S.tests[UNITS[k].no]=true;
      discsFor(k).forEach((d,i)=>{ S.done[dkey(k,i)]=true; });
    }
    S.xp+=30;
    const t=today();
    if(S.lastDay!==t){const y=new Date(Date.now()-864e5).toISOString().slice(0,10);S.streak=(S.lastDay===y)?S.streak+1:1;S.lastDay=t;}
    save();
  }
  document.getElementById('player').classList.remove('on');
  document.getElementById('fin-icon').textContent=pass?'🎉':'🔁';
  document.getElementById('fin-title').textContent=pass
    ?('Unités validées jusqu’ici ! 🎉')
    :('Presque ! '+wrongCount+' erreurs (2 max)');
  document.getElementById('fin-xp').textContent=pass?'+30':'+0';
  document.getElementById('fin-acc').textContent=acc+'%';
  const extra=document.getElementById('fin-extra');
  if(pass){
    extra.innerHTML='';
  }else{
    extra.innerHTML='<p style="max-width:320px;color:var(--cream);opacity:.85;margin:-6px auto 18px;font-size:14px">'+
      'Le test n\u2019est pas validé : l\u2019unité suivante reste verrouillée. Réessaie quand tu veux 💪</p>'+
      '<button class="cta" style="max-width:300px;margin-bottom:12px" onclick="startExam('+u+')">🔁 Refaire le test</button>';
  }
  document.getElementById('finish').classList.add('on');
}

function popIt(el){el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');}

function splitWord(w){

function tsTap(L,el){speak(L);popIt(el);el.classList.add('seen');
  window._ts.add(L);if(window._ts.size>=window._tsN)ctaOn();}
function setupDrag(L){
  const src=document.getElementById('dragSrc');if(!src)return;
  const cells=[...document.querySelectorAll('.fourc')];
  let ghost=null,dragging=false;
  function makeGhost(x,y){
    ghost=document.createElement('div');ghost.className='drag-ghost';ghost.textContent=L;
    document.body.appendChild(ghost);moveGhost(x,y);
  }
  function moveGhost(x,y){if(ghost){ghost.style.left=x+'px';ghost.style.top=y+'px';}}
  function cellAt(x,y){
    return cells.find(c=>{const r=c.getBoundingClientRect();
      return x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom;});
  }
  function drop(x,y){
    const c=cellAt(x,y);
    if(c){
      const pos=+c.dataset.pos;
      const slot=document.getElementById('fc'+pos);
      slot.textContent=formGlyph(L,pos);slot.style.color='var(--gold)';
      c.classList.add('lit');popIt(slot);speak(L);
      window._fsl.add(pos);if(window._fsl.size>=4)ctaOn();
    }
  }
  function xy(e){const t=(e.touches&&e.touches[0])||(e.changedTouches&&e.changedTouches[0])||e;return[t.clientX,t.clientY];}
  function start(e){e.preventDefault();dragging=true;const[x,y]=xy(e);makeGhost(x,y);src.style.opacity=.35;}
  function move(e){if(!dragging)return;e.preventDefault();const[x,y]=xy(e);moveGhost(x,y);
    cells.forEach(c=>c.classList.remove('hover'));const c=cellAt(x,y);if(c)c.classList.add('hover');}
  function end(e){if(!dragging)return;dragging=false;const[x,y]=xy(e);drop(x,y);
    cells.forEach(c=>c.classList.remove('hover'));src.style.opacity=1;
    if(ghost){ghost.remove();ghost=null;}}
  src.addEventListener('touchstart',start,{passive:false});
  src.addEventListener('touchmove',move,{passive:false});
  src.addEventListener('touchend',end);
  src.addEventListener('mousedown',start);
  window.addEventListener('mousemove',move);
  window.addEventListener('mouseup',end);
}
function fsTap(el,L,ok){
  if(ok){if(!el.classList.contains('hit')){el.classList.add('hit');speak(L);window._fs.found++;updFs();}}
  else{el.classList.add('miss');setTimeout(()=>el.classList.remove('miss'),400);}
}
function fwTap(el,ok){
  if(ok){if(!el.classList.contains('hit')){el.classList.add('hit');window._fs.found++;updFs();}}
  else{el.classList.add('miss');setTimeout(()=>el.classList.remove('miss'),400);}
}

function cmpTap(i,el,short,long){
  // son court (voyelle brève) puis son long bien étiré — en français pour être net
  const shortSay=['ma','mi','mou'][i];
  const longSay=['mâââ','mîîî','mououou'][i];
  speakFr(shortSay);
  setTimeout(()=>speakFr(longSay),900);
  el.classList.add('lit');
  window._cmp.add(i);if(window._cmp.size>=window._cmpN)ctaOn();
}
function setupRead(st){
  const box=document.getElementById('readbox');if(!box)return;
  const cells=[...box.querySelectorAll('.rc')];
  const N=cells.length;
  // ordre de lecture : RTL -> de l'index 0 (à droite) vers la fin
  let next=0;
  // 1re lettre déjà colorée pour aider
  cells[0].classList.add('on');next=1;
  if(N<=1){window._rd.done=true;ctaOn();}
  let painting=false;
  function zoneIndex(x){
    const r=box.getBoundingClientRect();
    let frac=Math.max(0,Math.min(0.999,(x-r.left)/r.width));
    let idx=Math.floor(frac*N);
    if(st.dir==='rtl')idx=N-1-idx;
    return idx;
  }
  function markAt(x){
    const idx=zoneIndex(x);
    // on ne colore QUE la prochaine lettre attendue (sens de lecture)
    if(idx===next){
      cells[next].classList.add('on');next++;
      if(next>=N&&!window._rd.done){
        window._rd.done=true;
        if(st.lang==='ar')speak(st.word);else speakFr('école');
        const ar=document.getElementById('readArrow');if(ar)ar.style.display='none';
        ctaOn();
      }
    }
  }
  function px(e){const t=(e.touches&&e.touches[0])||(e.changedTouches&&e.changedTouches[0])||e;return t.clientX;}
  function down(e){e.preventDefault();painting=true;markAt(px(e));}
  function move(e){if(!painting)return;e.preventDefault();markAt(px(e));}
  function up(){painting=false;}
  box.addEventListener('touchstart',down,{passive:false});
  box.addEventListener('touchmove',move,{passive:false});
  box.addEventListener('touchend',up);
  box.addEventListener('mousedown',down);
  box.addEventListener('mousemove',move);
  box.addEventListener('mouseup',up);
  box.addEventListener('mouseleave',up);
}
function bestVoice(lang){
  try{
    const vs=speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.toLowerCase().startsWith(lang));
    if(!vs.length)return null;
    const nice=vs.find(v=>/siri|premium|enhanced|natural|amélie|aurélie|thomas|amelie|marie|audrey/i.test(v.name));
    return nice||vs[0];
  }catch(e){return null;}
}
function speakFr(t,isNarr){
  try{
    const allowed=isNarr?NARR:SND;
    if(!allowed||!('speechSynthesis'in window))return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';u.rate=.95;u.pitch=1.05;
    const v=bestVoice('fr');if(v)u.voice=v;
    setTimeout(()=>speechSynthesis.speak(u),60);}catch(e){}
}
function fiTap(el,L){
  speak(L);popIt(el);
  el.classList.add('done');
  if(!el.dataset.t){el.dataset.t=1;window._fi++;}
  if(window._fi>=4)ctaOn();
}
function spotTap(el,ok){
  if(ok&&!el.classList.contains('hit')){
    el.classList.add('hit');window._spot.found++;
    const c=document.getElementById('spot-c');
    c.textContent=window._spot.found+' / '+window._spot.need+' trouvés';
    if(window._spot.found>=window._spot.need){c.textContent='✓ Tous trouvés ! ماشاء الله';ctaOn();}
  } else if(!ok){
    el.classList.add('miss');setTimeout(()=>el.classList.remove('miss'),400);
  }
}
function splitUnits(word){
  // sépare chaque lettre de base et chaque harakat comme une unité distincte
  const HARAKAT='\u064B\u064C\u064D\u064E\u064F\u0650\u0651\u0652'; // ـًـٌـٍـَـُـِـّـْ
  const out=[];
  for(const ch of word){
    if(HARAKAT.includes(ch))out.push(ch); else out.push(ch);
  }
  return out;
}
function isHarakat(ch){
  return '\u064B\u064C\u064D\u064E\u064F\u0650\u0651\u0652'.includes(ch);
}
function tileLabel(ch){
  const HARAKAT='\u064B\u064C\u064D\u064E\u064F\u0650\u0651\u0652';
  // harakat seule : portée sur un tatweel (ـ), qui appartient à la police arabe et
  // accroche le signe de façon fiable partout (le cercle pointillé ◌ manque sur desktop).
  if(HARAKAT.includes(ch))return '<span class="dc">\u0640'+ch+'</span>';
  return ch;
}
function renderSlots(){

function asmUndo(){
  const a=window._asm;

const MADD_SOUND={'ا':'le son « a »','و':'le son « ou »','ي':'le son « i »'};
function errorBeep(){
  if(!SND)return;
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext; if(!Ctx)return;
    const ac=window._ac||(window._ac=new Ctx());
    if(ac.state==='suspended')ac.resume();
    const t=ac.currentTime, o=ac.createOscillator(), g=ac.createGain();
    o.type='square'; o.frequency.setValueAtTime(200,t);
    o.frequency.exponentialRampToValueAtTime(110,t+0.18);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.13,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.24);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+0.26);
  }catch(e){}
}
function setupDragAssoc(st){
  const wrap=document.getElementById('da-wrap'); if(!wrap)return;
  const cells=[...wrap.querySelectorAll('.da-cell')];
  const fb=document.getElementById('da-fb');
  const cta=document.getElementById('cta');
  const tiles=[...wrap.querySelectorAll('.da-tile')];
  let done=0;
  const cellUnder=(tile)=>{
    const tb=tile.getBoundingClientRect(), cx=tb.left+tb.width/2, cy=tb.top+tb.height/2;
    return cells.find(c=>{const r=c.getBoundingClientRect();return cx>r.left&&cx<r.right&&cy>r.top&&cy<r.bottom;});
  };
  tiles.forEach(tile=>{
    let dragging=false,sx=0,sy=0;
    const down=e=>{ if(tile.classList.contains('placed'))return; dragging=true; tile.classList.add('drag');
      const p=e.touches?e.touches[0]:e; sx=p.clientX; sy=p.clientY;
      try{ if(e.pointerId!=null)tile.setPointerCapture(e.pointerId);}catch(_){}
      e.preventDefault(); };
    const move=e=>{ if(!dragging)return; const p=e.touches?e.touches[0]:e;
      tile.style.transform='translate('+(p.clientX-sx)+'px,'+(p.clientY-sy)+'px) scale(1.1)';
      const c=cellUnder(tile); cells.forEach(cc=>cc.classList.toggle('over',cc===c&&!cc.classList.contains('done')));
      e.preventDefault(); };
    const up=e=>{ if(!dragging)return; dragging=false; tile.classList.remove('drag');
      const c=cellUnder(tile); cells.forEach(cc=>cc.classList.remove('over'));
      if(c && !c.classList.contains('done') && c.dataset.madd===tile.dataset.ch){
        tile.style.transform=''; tile.classList.add('placed');
        c.innerHTML='<span class="da-long">'+c.dataset.long+'</span>'; c.classList.add('done');
        warmVoices(); speak(c.dataset.say); done++;
        if(fb){ fb.className='dm-fb ok'; fb.textContent='ماشاء الله — '+c.dataset.long; }
        if(done>=cells.length){ if(cta)cta.disabled=false; if(fb){fb.className='dm-fb ok';fb.textContent='Bravo ! Tu peux continuer ✓';} }
      } else {
        tile.style.transition='transform .25s ease'; tile.style.transform='';
        setTimeout(()=>{tile.style.transition='';},260);
        if(c && !c.classList.contains('done')){ errorBeep();
          if(fb){ fb.className='dm-fb bad'; fb.textContent='Pas la bonne lettre 🙅';
            setTimeout(()=>{ if(done<cells.length){fb.className='dm-fb';fb.textContent='';} },1400); } }
      } };
    tile.addEventListener('pointerdown',down);
    tile.addEventListener('pointermove',move);
    tile.addEventListener('pointerup',up);
    tile.addEventListener('pointercancel',up);
  });
}
function setupDragMad(st){

            'Mais ici c\u2019est écrit « '+st.read+' » : on ne peut l\u2019allonger que par la prolongation « '+st.tag+' » (<span style="font-family:var(--ar);font-size:22px">'+st.answer+'</span>).'+
            '<br><button class="dm-ok" onclick="this.closest(\'.dm-fb\').className=\'dm-fb\';this.closest(\'.dm-fb\').innerHTML=\'\'">J\u2019ai compris</button></div>';
        }

}
function setupTrace(L){
  const c=document.getElementById('trace');if(!c)return;
  const x=c.getContext('2d');
  const dpr=window.devicePixelRatio||1, W=300;
  c.width=W*dpr;c.height=W*dpr;x.scale(dpr,dpr);
  function letterStyle(){x.font='190px Amiri, serif';x.textAlign='center';x.textBaseline='alphabetic';}
  function guide(skip){
    x.clearRect(0,0,W,W);
    x.strokeStyle='#4A403A';x.lineWidth=1;
    x.beginPath();x.moveTo(20,190);x.lineTo(W-20,190);x.stroke();
    if(skip)return;
    letterStyle();x.fillStyle='rgba(220,144,46,.20)';x.fillText(L,W/2,215);
    // flèches de départ : données dédiées starts[L] = [{x,y,ang} | {dot:[x,y]}]
    const ST=(UNITS[curU].starts&&UNITS[curU].starts[L])||[];
    const G='#6FB08A';
    function label(px,py,n){ if(ST.length<2)return;
      x.fillStyle='#08231a';x.font='bold 12px sans-serif';x.textAlign='center';x.textBaseline='middle';
      x.fillText(String(n),px,py);x.fillStyle=G;x.textBaseline='alphabetic'; }
    ST.forEach((s,i)=>{
      if(s.dots){ x.strokeStyle=G;x.lineWidth=3;
        s.dots.forEach(d=>{x.beginPath();x.arc(d[0],d[1],9,0,7);x.stroke();});
        label(s.dots[0][0],s.dots[0][1],i+1); return; }
      if(s.dot){ x.strokeStyle=G;x.lineWidth=3;x.beginPath();x.arc(s.dot[0],s.dot[1],9,0,7);x.stroke();
        label(s.dot[0],s.dot[1],i+1); return; }
      const ang=s.ang*Math.PI/180, len=30, ah=10;
      const ex=s.x+Math.cos(ang)*len, ey=s.y+Math.sin(ang)*len;
      x.strokeStyle=G;x.fillStyle=G;x.lineWidth=5;x.lineCap='round';x.lineJoin='round';
      x.beginPath();x.moveTo(s.x,s.y);x.lineTo(ex,ey);x.stroke();
      x.beginPath();x.moveTo(ex,ey);x.lineTo(ex-ah*Math.cos(ang-0.5),ey-ah*Math.sin(ang-0.5));
      x.moveTo(ex,ey);x.lineTo(ex-ah*Math.cos(ang+0.5),ey-ah*Math.sin(ang+0.5));x.stroke();
      x.beginPath();x.arc(s.x,s.y,8,0,7);x.fill();
      label(s.x,s.y,i+1);
    });
  }
  guide();
  let drawing=false,drew=false;
  function pos(e){const r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;
    return [(t.clientX-r.left)*W/r.width,(t.clientY-r.top)*W/r.height];}
  function down(e){e.preventDefault();drawing=true;const[a,b]=pos(e);x.beginPath();x.moveTo(a,b);}
  function move(e){if(!drawing)return;e.preventDefault();const[a,b]=pos(e);
    x.strokeStyle='#F2E9DA';x.lineWidth=8;x.lineCap='round';x.lineJoin='round';x.lineTo(a,b);x.stroke();
    if(!drew){drew=true;ctaOn();}}
  function up(){drawing=false;}
  c.onmousedown=down;c.onmousemove=move;c.onmouseup=up;c.onmouseleave=up;
  c.ontouchstart=down;c.ontouchmove=move;c.ontouchend=up;
  window._traceClear=()=>{guide();drew=false;document.getElementById('cta').disabled=true;};
  let demoOn=false;
  const STK=UNITS[curU].strokes[L]||[];
  window._traceDemo=()=>{
    if(demoOn)return;
    if(!STK.length){toast('Démo bientôt disponible pour cette lettre');return;}
    demoOn=true;
    const segs=[];let totLen=0;
    STK.forEach(st=>{
      if(st.dot){segs.push({dot:st.dot,len:120});totLen+=120;return;}
      for(let i=1;i<st.pts.length;i++){
        const l=Math.hypot(st.pts[i][0]-st.pts[i-1][0],st.pts[i][1]-st.pts[i-1][1]);
        segs.push({a:st.pts[i-1],b:st.pts[i],len:l});totLen+=l;
      }
      segs.push({pause:1,len:70});totLen+=70; // la plume se lève
    });
    const speed=totLen/2400; // px par ms
    let t0=null;
    function frame(ts){
      if(t0===null)t0=ts;
      let dist=(ts-t0)*speed;
      const fini=dist>=totLen;
      guide(true);
      x.strokeStyle='#DC902E';x.lineWidth=10;x.lineCap='round';x.lineJoin='round';
      let pen=null;
      for(const s of segs){
        if(dist<=0)break;
        if(s.pause){dist-=s.len;continue;}
        if(s.dot){
          if(dist>=s.len){x.fillStyle='#DC902E';x.beginPath();x.arc(s.dot[0],s.dot[1],8,0,7);x.fill();}
          else pen=s.dot;
          dist-=s.len;continue;
        }
        const d=Math.min(1,dist/s.len);
        const bx=s.a[0]+(s.b[0]-s.a[0])*d, by=s.a[1]+(s.b[1]-s.a[1])*d;
        x.beginPath();x.moveTo(s.a[0],s.a[1]);x.lineTo(bx,by);x.stroke();
        if(d<1)pen=[bx,by];
        dist-=s.len;
      }
      if(pen){x.fillStyle='#F2E9DA';x.beginPath();x.arc(pen[0],pen[1],6,0,7);x.fill();}
      if(!fini)requestAnimationFrame(frame);
      else setTimeout(()=>{guide();drew=false;document.getElementById('cta').disabled=true;demoOn=false;},900);
    }
    requestAnimationFrame(frame);
  };
}

  // consonne+chedda -> consonne+soukoun+consonne : double le son à l'oral
  return t.replace(/([^\u064B-\u0652\u0670\s])([\u064B-\u0650\u0652\u0670]*)\u0651([\u064B-\u0652\u0670]*)/g,(_,b,pre,post)=>b+'\u0652'+b+pre+post);
}

function lvpFlip(card,consWord,proWord){ // carte recto/verso robuste (sans 3D) : écrase, bascule, joue le son visible
  try{
    const showProAfter=!card.classList.contains('flipped');
    card.classList.add('flipping');
    setTimeout(()=>{card.classList.toggle('flipped');card.classList.remove('flipping');},230);
    warmVoices();
    const w=showProAfter?proWord:consWord;
    if(w)speak(w);
    const n=(parseInt(card.dataset.taps||'0',10))+1; card.dataset.taps=n;
    if(n>=2)card.classList.add('seen');
    const wrap=card.closest&&card.closest('.lvp-cards');
    if(wrap&&wrap.dataset.gate==='1'){
      const all=[...wrap.querySelectorAll('.lvp-flip')];
      if(all.every(c=>parseInt(c.dataset.taps||'0',10)>=2)){
        const cta=document.getElementById('cta'); if(cta)cta.disabled=false;
      }
    }
  }catch(e){ try{card.classList.toggle('flipped');}catch(_){ } }
}

// Translittération arabe -> latin : utilisée comme repli quand AUCUNE voix arabe n'est
// disponible (ex. aperçu sandboxé, iPhone sans voix arabe installée). Au moins audible.
const AR2LAT={
 'ا':'a','أ':'a','إ':'i','آ':'aa','ٱ':'a','ى':'a','ة':'a','ء':'',
 'ب':'b','ت':'t','ث':'s','ج':'dj','ح':'h','خ':'r','د':'d','ذ':'z','ر':'r','ز':'z',
 'س':'s','ش':'ch','ص':'s','ض':'d','ط':'t','ظ':'z','ع':'a','غ':'r','ف':'f','ق':'k',
 'ك':'k','ل':'l','م':'m','ن':'n','ه':'h','و':'w','ي':'y','ﺀ':'',
 '\u064E':'a','\u0650':'i','\u064F':'ou','\u064B':'ane','\u064D':'ine','\u064C':'oune',
 '\u0652':'','\u0651':'','\u0670':'a','\u0640':''
};
function translit(t){ let o=''; for(const ch of (t||'')) o += (ch in AR2LAT)?AR2LAT[ch]:ch; return o.trim(); }

function _speakSynth(t){ // repli synthèse : voix arabe si dispo, sinon translittération sur voix par défaut
  if(!('speechSynthesis'in window))return;
  try{
    speechSynthesis.cancel();
    const go=()=>{
      let u;
      const arV=bestVoice('ar');
      if(arV){                                   // voix arabe dispo : prononciation correcte
        u=new SpeechSynthesisUtterance(expandShadda(t));
        u.voice=arV; u.lang=arV.lang||'ar-SA';
      }else{                                     // pas de voix arabe : translittération audible
        u=new SpeechSynthesisUtterance(translit(expandShadda(t)));
        const frV=bestVoice('fr')||bestVoice('en');
        if(frV){ u.voice=frV; u.lang=frV.lang; } else { u.lang='fr-FR'; }
      }
      u.rate=.75;
      try{speechSynthesis.speak(u);}catch(e){}
    };
    if(!speechSynthesis.getVoices().length){     // voix pas encore chargées : on attend l'événement
      let done=false; const once=()=>{ if(done)return; done=true; go(); };
      try{speechSynthesis.addEventListener('voiceschanged',once,{once:true});}catch(e){}
      setTimeout(once,350);
    }else{
      setTimeout(go,60);
    }
  }catch(e){}
}
function speak(t){
  try{
    warmVoices();                                   // amorce le moteur vocal (repli IA fiable sur iOS)
    const url=AUDIO[t];
    if(!url){ _speakSynth(t); return; }            // aucun mapping -> synthèse directe
    const a=new Audio(url);
    let settled=false;
    const toSynth=()=>{ if(settled)return; settled=true; try{a.pause();}catch(_){ } _speakSynth(t); };
    a.addEventListener('playing',()=>{ settled=true; },{once:true}); // le fichier joue : on neutralise tout repli
    a.addEventListener('error',toSynth,{once:true});   // fichier 404 / illisible -> synthèse
    a.addEventListener('stalled',toSynth,{once:true}); // chargement bloqué -> synthèse
    a.addEventListener('abort',toSynth,{once:true});
    const p=a.play();
    if(p&&p.catch)p.catch(toSynth);                    // lecture refusée -> synthèse
    // filet de sécurité : si rien n'a démarré (fichier absent/lent), on bascule en voix de synthèse
    setTimeout(()=>{ if(!settled && a.paused) toSynth(); },1100);
  }catch(e){ try{_speakSynth(t);}catch(_){ } }
}
// Réveille le moteur vocal dès la 1re interaction (sinon le 1er son est muet sur iOS)

  if(_voiceReady||!('speechSynthesis'in window))return;

  }catch(e){}
}

// ===== Reconnaissance vocale (lecture à voix haute, modèle Duolingo) =====
function normReco(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z\u0600-\u06ff]/g,'').trim();
}
function recoMatch(said,w){
  const n=normReco(said);if(!n)return false;
  const arBare=normReco(w.b);
  if(n.includes(arBare)||arBare.includes(n))return true;
  return (w.alts||[w.say]).some(a=>{const na=normReco(a);return na&&(n.includes(na)||na.includes(n));});
}
function startReco(btn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const fb=document.getElementById('recoFb');
  if(!SR){
    fb.innerHTML='<div class="reco-warn">🎤 Ton appareil ne permet pas d\u2019écouter ta voix ici. '+
      'Lis le mot à voix haute, puis confirme.</div>'+
      '<button class="cta" style="margin-top:10px" onclick="recoSelf()">✅ Je l\u2019ai lu</button>';
    return;
  }
  let rec;try{rec=new SR();}catch(e){recoSelf();return;}
  rec.lang='ar-SA';rec.interimResults=false;rec.maxAlternatives=5;
  btn.classList.add('listening');btn.textContent='🎙️ J\u2019écoute…';
  fb.innerHTML='<div class="hint">Parle maintenant…</div>';
  let got=false;
  rec.onresult=(ev)=>{
    got=true;const alts=[];
    for(let i=0;i<ev.results[0].length;i++)alts.push(ev.results[0][i].transcript);
    const ok=alts.some(a=>recoMatch(a,window._reco.w));
    btn.classList.remove('listening');btn.textContent='🎙️ Réessayer';
    if(ok){window._reco.ok=true;
      fb.innerHTML='<div class="reco-ok">✅ Très bien ! ماشاء الله</div>';
      speak(window._reco.w.w);ctaOn();
    }else{
      fb.innerHTML='<div class="reco-retry">🔁 Pas tout à fait — réécoute le modèle et réessaie.</div>'+
        '<button class="narr-link" style="margin-top:4px" onclick="recoSelf()">Valider quand même</button>';
    }
  };
  rec.onerror=(e)=>{
    btn.classList.remove('listening');btn.textContent='🎙️ Lis le mot';
    fb.innerHTML='<div class="reco-warn">🎤 Micro indisponible. Lis à voix haute puis confirme.</div>'+
      '<button class="cta" style="margin-top:10px" onclick="recoSelf()">✅ Je l\u2019ai lu</button>';
  };
  rec.onend=()=>{btn.classList.remove('listening');
    if(!got&&!window._reco.ok)btn.textContent='🎙️ Lis le mot';};
  try{rec.start();}catch(e){recoSelf();}
}
function recoSelf(){
  window._reco.ok=true;const fb=document.getElementById('recoFb');
  if(fb)fb.innerHTML='<div class="reco-ok">✅ Continue !</div>';
  speak(window._reco.w.w);ctaOn();
}

/* ===== Révision globale (réutilise le lecteur, ne marque aucun disque) ===== */
function frOptions(pool,w){
  const others=shuffle(pool.filter(x=>x.fr!==w.fr)).slice(0,2);
  return shuffle([{txt:w.fr,key:w.fr},...others.map(x=>({txt:x.fr,key:x.fr}))]);
}
function startReview(){
  const pool=[]; UNITS.forEach((U,idx)=>{ if(unitUnlocked(idx))(U.words||[]).forEach(w=>pool.push(w)); });
  if(!pool.length)return;
  let bag=shuffle(pool.slice());
  const qs=[]; let turn=0;
  while(bag.length && qs.length<13){
    const mod=turn%3;
    if(mod===0 && bag.length>=3){            // 1) association de mots
      const n=Math.min(6,bag.length);
      qs.push({type:'match', graded:false, pairs:bag.splice(0,n).map(w=>({ar:w.w,fr:w.fr}))});
    } else if(mod===1 || (mod===0 && bag.length<3)){ // 2) mot arabe → choisir la traduction
      const w=bag.shift();
      qs.push(mcq({prompt:'Que veut dire ce mot ?',glyph:w.w,glyphLinear:true,graded:true,grid:'grid3',answer:w.fr,options:frOptions(pool,w)}));
    } else {                                 // 3) mot français → l'écrire en arabe
      const w=bag.shift();
      qs.push({type:'assemble', w, graded:true, fromFr:true});
    }
    turn++;
  }
  QUEUE=[{type:'slide',title:'Révision du vocabulaire',html:'<p>On révise les mots appris : associe, traduis, écris. C\u2019est parti !</p>'},...qs];
  REVIEW=true;EXAM=false;backTo='cours';curU=lastUnlockedIndex();curD=-1;qi=0;wrongCount=0;MISSED=[];inRetry=false;
  S.hearts=5;S.heartDay=today();save();
  document.getElementById('player').classList.add('on');
  document.getElementById('finish').classList.remove('on');
  document.getElementById('p-hearts').textContent=S.hearts;
  document.getElementById('st-hearts').textContent=S.hearts;
  total=QUEUE.filter(s=>s.graded).length;
  renderStep();
}
/* ----- association de mots (paires) ----- */
function derangedOrder(base){ // renvoie une permutation de base sans aucun élément à sa place
  const n=base.length; if(n<2)return base.slice();
  for(let t=0;t<60;t++){ const p=shuffle(base.slice()); if(p.every((v,i)=>v!==base[i]))return p; }
  return base.slice(1).concat(base.slice(0,1)); // repli : rotation (aucun point fixe)
}
function renderMatch(){
  const M=window._mt, box=document.getElementById('matchBox'); if(!box)return;
  let h='';
  if(M.done.length){
    h+='<div class="m-done">'+M.done.map(pi=>
      '<div class="m-row"><span class="m-ar">'+M.pairs[pi].ar+'</span><span class="m-link">✓</span><span class="m-fr">'+M.pairs[pi].fr+'</span></div>').join('')+'</div>';
  }
  if(M.leftPool.length){
    h+='<div class="m-cols"><div class="m-col">'+
      M.leftPool.map(pi=>'<button class="m-cell m-arc'+(M.sel&&M.sel.side==='L'&&M.sel.pi===pi?' sel':'')+'" onclick="matchTap(\'L\','+pi+',this)">'+M.pairs[pi].ar+'</button>').join('')+
      '</div><div class="m-col">'+
      M.rightPool.map(pi=>'<button class="m-cell'+(M.sel&&M.sel.side==='R'&&M.sel.pi===pi?' sel':'')+'" onclick="matchTap(\'R\','+pi+',this)">'+M.pairs[pi].fr+'</button>').join('')+
      '</div></div>';
  }
  box.innerHTML=h;
}
function matchTap(side,pi,el){
  const M=window._mt; if(!M)return;
  if(M.sel===null){ M.sel={side,pi}; renderMatch(); return; }
  if(M.sel.side===side){ M.sel=(M.sel.pi===pi)?null:{side,pi}; renderMatch(); return; }
  if(M.sel.pi===pi){           // bonne association (même paire des deux côtés)
    M.done.push(pi);
    M.leftPool=M.leftPool.filter(x=>x!==pi);
    M.rightPool=M.rightPool.filter(x=>x!==pi);
    M.sel=null; renderMatch();
    if(M.leftPool.length===0)ctaOn();
  } else {                     // mauvaise association : flash rouge bref
    const selBtn=document.querySelector('.m-cell.sel'); if(selBtn)selBtn.classList.add('bad');
    if(el)el.classList.add('bad');
    M.sel=null;
    setTimeout(renderMatch,420);
  }
}
function finishReview(){
  REVIEW=false; S.xp+=10;
  const t=today(); if(S.lastDay!==t){const y=new Date(Date.now()-864e5).toISOString().slice(0,10);S.streak=(S.lastDay===y)?S.streak+1:1;S.lastDay=t;}
  save();
  const acc=total?Math.round((total-Math.min(total,wrongCount))/total*100):100;
  document.getElementById('player').classList.remove('on');
  document.getElementById('fin-icon').textContent='🎉';
  document.getElementById('fin-extra').innerHTML='';
  document.getElementById('fin-title').textContent='Révision terminée ! 🎉';
  document.getElementById('fin-xp').textContent='+10';
  document.getElementById('fin-acc').textContent=acc+'%';
  document.getElementById('finish').classList.add('on');
}
function returnFromPlayer(){ if(backTo==='cours'){ backTo=null; showTab('cours','revision'); } else { renderHome(); } }
