<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preview · Rang de constance — 3 variantes</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@500;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#252120; --panel:#2e2926; --line:#443d38; --gold:#DC902E; --gold2:#E8A94F; --muted:#B9A99A; --ink:#F2E9DA; }
  *{box-sizing:border-box}
  body{margin:0;background:#1b1817;color:var(--ink);font-family:Nunito,system-ui,sans-serif;padding:20px 12px 70px;max-width:560px;margin:0 auto}
  h1{font-size:19px;color:var(--gold2);margin:6px 0 2px}
  p.intro{color:var(--muted);font-size:14px;margin:0 0 18px;line-height:1.5}
  h2{font-size:16px;margin:26px 0 4px;display:flex;align-items:center;gap:8px}
  h2 .tag{font-size:11px;font-weight:900;letter-spacing:.08em;background:var(--gold);color:#252120;border-radius:8px;padding:2px 8px}
  p.note{color:var(--muted);font-size:13px;margin:0 0 10px;line-height:1.45}
  .bar{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:10px 14px;margin-bottom:8px}
  .left{display:flex;align-items:center;gap:10px}
  .rk{display:flex;align-items:center;gap:7px}
  .rk svg{display:block}
  .rk .nm{font-family:'Noto Naskh Arabic',serif;font-size:19px;font-weight:700;line-height:1}
  .lvl{color:var(--muted);font-size:12px;font-weight:800;min-width:90px;text-align:right}
  .oth{color:var(--muted);font-size:14px;font-weight:800}
  .glow1 svg{filter:drop-shadow(0 0 3px currentColor)}
  .glow2 svg{filter:drop-shadow(0 0 7px currentColor)}
</style>
</head>
<body>
<h1>Le rang dans la barre du haut — 3 variantes</h1>
<p class="intro">La toque 🎓 disparaît. L'icône <b>se remplit de la couleur du rang</b> (7 paliers : de la pierre grise à la lumière dorée) et le nom arabe prend la même couleur. Les deux derniers rangs rayonnent légèrement. Touche = même popup qu'aujourd'hui.</p>

<div id="zones"></div>

<script>
const RANKS=[
 {ar:'النية',      fr:'l’intention',  c:'#8f8a82', glow:0},
 {ar:'الهمّة',     fr:'l’élan',       c:'#a9764a', glow:0},
 {ar:'الاجتهاد',   fr:'l’effort',     c:'#b08d57', glow:0},
 {ar:'المثابرة',   fr:'l’assiduité',  c:'#b9c2cc', glow:0},
 {ar:'الصبر',      fr:'la patience',  c:'#d9b46a', glow:0},
 {ar:'الاستقامة',  fr:'la constance', c:'#DC902E', glow:1},
 {ar:'النور',      fr:'la lumière',   c:'#f6e7b0', glow:2},
];

/* — icône A : étoile à 8 branches (motif islamique, rubʿ al-ḥizb) — */
function starSVG(color){
  const pts=[];
  for(let k=0;k<16;k++){
    const r=(k%2===0)?13:8.2, a=(k*22.5-90)*Math.PI/180;
    pts.push((16+r*Math.cos(a)).toFixed(1)+','+(16+r*Math.sin(a)).toFixed(1));
  }
  return '<svg width="26" height="26" viewBox="0 0 32 32"><polygon points="'+pts.join(' ')+'" fill="'+color+'"/><circle cx="16" cy="16" r="3.6" fill="#252120"/></svg>';
}
/* — icône B : la coupe (proposition Myriam) — */
function cupSVG(color){
  return '<svg width="26" height="26" viewBox="0 0 32 32" fill="'+color+'">'+
    '<path d="M9 5h14v7a7 7 0 0 1-14 0z"/>'+
    '<path d="M7 7H4.5a.9.9 0 0 0-.9 1c.3 3.4 2.4 5.6 5.4 6.3l-1.6-2.1C5.6 11.3 5 9.8 5 8.4h2zM25 7h2.5a.9.9 0 0 1 .9 1c-.3 3.4-2.4 5.6-5.4 6.3l1.6-2.1c1.8-.9 2.4-2.4 2.4-3.8h-2z"/>'+
    '<rect x="14.4" y="18" width="3.2" height="4.5" rx="1"/>'+
    '<path d="M10.5 25.5a1.5 1.5 0 0 1 1.5-1.5h8a1.5 1.5 0 0 1 1.5 1.5V27h-11z"/></svg>';
}
/* — icône C : la lampe (mishkât — vers An-Nūr, la 7e station) — */
function lampSVG(color){
  return '<svg width="26" height="26" viewBox="0 0 32 32">'+
    '<rect x="13" y="2.5" width="6" height="2.6" rx="1.2" fill="'+color+'"/>'+
    '<path d="M16 6c-4.6 0-7.5 3.4-7.5 8.2 0 4 2.2 7 4.6 8.3h5.8c2.4-1.3 4.6-4.3 4.6-8.3C23.5 9.4 20.6 6 16 6z" fill="none" stroke="'+color+'" stroke-width="2.1"/>'+
    '<path d="M16 10.2c2 2.2 3 3.9 3 5.6a3 3 0 0 1-6 0c0-1.7 1-3.4 3-5.6z" fill="'+color+'"/>'+
    '<path d="M11.5 24.6h9l1 2.9h-11z" fill="'+color+'"/></svg>';
}

const VARIANTS=[
 {tag:'A', title:'Étoile à huit branches', icon:starSVG,
  note:'Le motif islamique classique (rubʿ al-ḥizb ۞, celui des coins de page du muṣḥaf). Sobre, aucun code « compétition ».'},
 {tag:'B', title:'La coupe', icon:cupSVG,
  note:'Ta proposition : une coupe qui change de couleur à chaque rang.'},
 {tag:'C', title:'La lampe (mishkât) — ma préférée', icon:lampSVG,
  note:'La lampe de la niche (Āyat an-Nūr 24:35). La flamme prend la couleur du rang, et au 7e rang — النور, la lumière — la lampe rayonne pleinement. L’icône raconte exactement le chemin des 7 stations.'},
];

const zones=document.getElementById('zones');
VARIANTS.forEach(function(v){
  let h='<h2><span class="tag">'+v.tag+'</span>'+v.title+'</h2><p class="note">'+v.note+'</p>';
  RANKS.forEach(function(r,i){
    h+='<div class="bar"><div class="left"><span class="oth">🔥 12</span>'+
       '<span class="rk'+(r.glow===1?' glow1':r.glow===2?' glow2':'')+'" style="color:'+r.c+'">'+v.icon(r.c)+
       '<span class="nm" style="color:'+r.c+'">'+r.ar+'</span></span></div>'+
       '<span class="oth">❤️ 7</span><span class="lvl">rang '+(i+1)+' · '+r.fr+'</span></div>';
  });
  zones.insertAdjacentHTML('beforeend',h);
});
</script>
</body>
</html>
